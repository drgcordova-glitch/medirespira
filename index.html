<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediRespira Ecuador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#080e1c;color:#e2e8f0;min-height:100vh;}
input,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0f172a;}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px;}
 
#hdr{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(148,163,184,0.1);padding:10px 14px;position:sticky;top:0;z-index:60;backdrop-filter:blur(20px);}
.htop{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.logo{background:linear-gradient(135deg,#2563eb,#0891b2);border-radius:11px;padding:7px 10px;font-size:18px;line-height:1;}
.ht h1{font-size:15px;font-weight:800;color:#f1f5f9;}
.ht p{font-size:9px;color:#475569;}
.bref{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:2px 8px;font-size:9px;color:#fca5a5;white-space:nowrap;}
 
/* TABS */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px;margin-left:auto;flex-wrap:wrap;}
.tab{padding:5px 13px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#64748b;transition:all .15s;white-space:nowrap;}
.tab.on{color:#fff;}
.tab.t0.on{background:#10b981;}
.tab.t1.on{background:#3b82f6;}
.tab.t2.on{background:#06b6d4;}
.tab.t3.on{background:#8b5cf6;}
 
/* PESO BAR */
#peso-bar{display:none;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:10px;padding:8px 14px;margin-top:8px;align-items:center;gap:12px;flex-wrap:wrap;}
#peso-bar label{font-size:12px;font-weight:700;color:#34d399;}
#kg{width:80px;padding:6px 10px;border-radius:7px;border:1px solid rgba(16,185,129,0.3);background:rgba(0,0,0,0.35);color:#fbbf24;font-size:17px;font-weight:800;outline:none;text-align:center;}
#kg-hint{font-size:10px;color:#64748b;}
 
/* BUSQUEDA RAPIDA */
#search-bar{margin-top:8px;display:none;}
.search-row{display:flex;gap:6px;}
#qinput{flex:1;padding:9px 13px;border-radius:10px;border:1px solid rgba(148,163,184,0.15);background:rgba(255,255,255,0.05);color:#f1f5f9;font-size:13px;outline:none;}
#qinput::placeholder{color:#475569;}
#qbtn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
 
/* PILLS RAPIDAS */
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.pill{padding:4px 11px;border-radius:20px;border:1px solid rgba(148,163,184,0.12);background:rgba(255,255,255,0.04);color:#94a3b8;font-size:10px;cursor:pointer;transition:all .15s;}
.pill:hover{background:rgba(255,255,255,0.09);color:#cbd5e1;}
 
/* BODY */
#body{max-width:860px;margin:0 auto;padding:12px 12px 40px;}
 
/* RESPUESTA */
#resp-box{background:rgba(6,10,22,0.97);border-radius:13px;border:1px solid rgba(148,163,184,0.08);padding:16px 18px;margin-bottom:12px;display:none;}
#resp-titulo{font-size:13px;font-weight:800;color:#f1f5f9;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
#resp-content{font-size:12px;color:#cbd5e1;line-height:1.8;white-space:pre-wrap;}
.resp-loading{color:#64748b;font-size:12px;}
 
/* CHAT */
#chat-wrap{max-width:860px;margin:0 auto;}
#cms{display:flex;flex-direction:column;gap:10px;min-height:200px;padding:4px 0;}
.cb{max-width:90%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.75;white-space:pre-wrap;}
.cb.u{align-self:flex-end;background:#1d4ed8;color:#eff6ff;border-bottom-right-radius:2px;}
.cb.a{align-self:flex-start;background:rgba(255,255,255,.06);color:#cbd5e1;border-bottom-left-radius:2px;}
.cld{align-self:flex-start;background:rgba(255,255,255,.05);border-radius:12px;padding:10px 14px;font-size:12px;color:#64748b;}
.cir{display:flex;gap:6px;margin-top:10px;position:sticky;bottom:0;background:#080e1c;padding:8px 0;}
#ci{flex:1;padding:10px 13px;border-radius:10px;border:1px solid rgba(148,163,184,.15);background:rgba(255,255,255,.06);color:#f1f5f9;font-size:13px;outline:none;}
#ci::placeholder{color:#475569;}
#csnd{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:#8b5cf6;color:#fff;}
#csnd:disabled{background:rgba(255,255,255,.05);color:#334155;cursor:not-allowed;}
 
/* SUGERENCIAS CHAT */
.sugs{display:flex;flex-direction:column;gap:5px;padding:10px 0;}
.sug{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.1);border-radius:8px;padding:8px 13px;color:#94a3b8;font-size:11px;cursor:pointer;text-align:left;transition:all .15s;}
.sug:hover{background:rgba(255,255,255,.08);color:#cbd5e1;}
.sug-titulo{font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
 
@media(max-width:600px){.tab span{display:none;}.tab{padding:5px 8px;}}
</style>
</head>
<body>
 
<div id="hdr">
  <div class="htop">
    <div class="logo">🫁</div>
    <div class="ht">
      <h1>MediRespira Ecuador</h1>
      <p>Fybeca · Pharmacys · Mia · Económicas · IA Groq</p>
    </div>
    <span class="bref">⚕️ Solo referencia</span>
    <div class="tabs">
      <button class="tab t0" onclick="setTab(0)">👶 <span>Niños</span></button>
      <button class="tab t1" onclick="setTab(1)">🧑 <span>Adultos</span></button>
      <button class="tab t2" onclick="setTab(2)">🧴 <span>Jarabes</span></button>
      <button class="tab t3 on" onclick="setTab(3)">🤖 <span>IA Clínica</span></button>
    </div>
  </div>
 
  <!-- Peso bar (solo niños) -->
  <div id="peso-bar">
    <label>⚖️ Peso del niño:</label>
    <input id="kg" type="number" placeholder="kg" min="1" max="100"/>
    <span id="kg-hint">Ingresa el peso para calcular dosis automáticamente</span>
  </div>
 
  <!-- Búsqueda rápida (niños/adultos/jarabes) -->
  <div id="search-bar">
    <div class="search-row">
      <input id="qinput" type="text" placeholder="Escribe principio activo o nombre comercial... (ej: ambroxol, acetilcisteína, Fluimucil, salbutamol, Ventolin)"/>
      <button id="qbtn" onclick="buscarMed()">🔍 Buscar</button>
    </div>
    <div class="pills" id="pills-rapidas"></div>
  </div>
</div>
 
<div id="body">
  <!-- Resultado búsqueda -->
  <div id="resp-box">
    <div id="resp-titulo">📋 Resultado</div>
    <div id="resp-content"></div>
  </div>
 
  <!-- Chat IA -->
  <div id="chat-wrap">
    <div id="cms">
      <div class="sugs" id="sugs-inicio">
        <div class="sug-titulo">🤖 IA Clínica — Groq llama3-70b · Pregunta lo que quieras</div>
        <button class="sug" onclick="pregunta(this)">💬 Todas las marcas de acetilcisteína en Ecuador con presentaciones y precios</button>
        <button class="sug" onclick="pregunta(this)">💬 Todos los jarabes mucolíticos para niño de 3 años disponibles en Fybeca</button>
        <button class="sug" onclick="pregunta(this)">💬 Marcas de ambroxol en Ecuador — jarabe pediátrico y adulto</button>
        <button class="sug" onclick="pregunta(this)">💬 Antibiótico para otitis en bebé de 5 meses — dosis para 7 kg</button>
        <button class="sug" onclick="pregunta(this)">💬 ¿Qué contiene Fluritox y diferencia con Fluritox F?</button>
        <button class="sug" onclick="pregunta(this)">💬 Spray nasal para menor de 2 años — todas las opciones Ecuador</button>
        <button class="sug" onclick="pregunta(this)">💬 Todas las marcas de salbutamol MDI disponibles en Ecuador</button>
        <button class="sug" onclick="pregunta(this)">💬 Dosis de amoxicilina para niño de 15 kg con otitis media</button>
        <button class="sug" onclick="pregunta(this)">💬 Antihistamínico sin somnolencia para niño de 2 años — marcas Ecuador</button>
        <button class="sug" onclick="pregunta(this)">💬 Diferencia entre Symbicort, Seretide y Neumocort Plus</button>
        <button class="sug" onclick="pregunta(this)">💬 Corticoide para croup en niño de 3 años — dosis para 14 kg</button>
        <button class="sug" onclick="pregunta(this)">💬 ¿Tusigen necesita receta? ¿Qué contiene?</button>
      </div>
    </div>
    <div class="cir">
      <input id="ci" type="text" placeholder="✍️ Pregunta cualquier medicamento, dosis, marca, edad... (Enter)"/>
      <button id="csnd" onclick="sendC()">↑</button>
    </div>
  </div>
</div>
 
<script>
const GK="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";
let curTab=3, busy=false, CH=[];
 
// ══ PILLS POR PESTAÑA ══
const PILLS={
  0:["ambroxol","acetilcisteína","bromhexina","salbutamol oral","ibuprofeno","paracetamol","amoxicilina","azitromicina","cetirizina","loratadina","dextrometorfano","montelukast","prednisona"],
  1:["salbutamol MDI","Symbicort","Seretide","Flixotide","Pulmicort","Spiriva","Augmentine","claritromicina","fexofenadina","prednisona","dexametasona","Tamiflu"],
  2:["ambroxol jarabe","acetilcisteína jarabe","bromhexina jarabe","Tussolvina","Fluritox","Neogripal","Trioval","Abrilar","Degraler","loratadina jarabe","cetirizina jarabe","amoxicilina suspensión","azitromicina suspensión","ibuprofeno jarabe","paracetamol jarabe"]
};
 
function setTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach((b,i)=>{b.classList.toggle("on",i===t);});
  const pb=document.getElementById("peso-bar");
  const sb=document.getElementById("search-bar");
  const cw=document.getElementById("chat-wrap");
  const rb=document.getElementById("resp-box");
 
  if(t===3){
    pb.style.display="none";
    sb.style.display="none";
    cw.style.display="block";
    rb.style.display="none";
  } else {
    pb.style.display = t===0 ? "flex" : "none";
    sb.style.display="block";
    cw.style.display="block";
    rb.style.display="none";
    // set button color
    const colors=["#10b981","#3b82f6","#06b6d4","#8b5cf6"];
    document.getElementById("qbtn").style.background=colors[t];
    document.getElementById("qbtn").style.color="#fff";
    // pills
    const pr=document.getElementById("pills-rapidas");
    pr.innerHTML=(PILLS[t]||[]).map(p=>`<span class="pill" onclick="pillClick('${p}')">${p}</span>`).join("");
    document.getElementById("qinput").placeholder=
      t===0?"Escribe principio activo o marca (ambroxol, Fluimucil, salbutamol...)":
      t===1?"Escribe medicamento adulto (Symbicort, Seretide, Augmentine...)":
      "Escribe jarabe (Tussolvina, Abrilar, Degraler, amoxicilina suspensión...)";
  }
}
 
function pillClick(p){
  document.getElementById("qinput").value=p;
  buscarMed();
}
 
// ══ BÚSQUEDA RÁPIDA ══
async function buscarMed(){
  const q=document.getElementById("qinput").value.trim();
  if(!q||busy)return;
  const rb=document.getElementById("resp-box");
  const rc=document.getElementById("resp-content");
  const rt=document.getElementById("resp-titulo");
  rb.style.display="block";
  rc.innerHTML='<span class="resp-loading">⏳ Buscando en Ecuador...</span>';
  rt.innerHTML="📋 "+q;
 
  const kg=parseFloat(document.getElementById("kg").value)||0;
  const esNinos=curTab===0;
  const esJarabes=curTab===2;
 
  let prompt="";
  if(esNinos){
    prompt=`Soy médico en Ecuador. Busco información sobre: "${q}" para uso PEDIÁTRICO.
Dame:
1. ¿Qué es? (principio activo, mecanismo, clase)
2. Edad mínima aprobada
3. TODAS las marcas comerciales disponibles en Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas, Medicity, Sana Sana) con sus presentaciones exactas (mg/ml, tamaño frasco, forma farmacéutica) y precio aproximado si lo conoces
4. Dosis pediátrica por edad y por kg
${kg>0?"5. DOSIS ESPECÍFICA para niño de "+kg+" kg — calcula mg/dosis y ml/dosis según presentación disponible":""}
6. Contraindicaciones pediátricas
7. Efectos adversos principales`;
  } else if(curTab===1){
    prompt=`Soy médico en Ecuador. Busco información sobre: "${q}" para uso en ADULTOS.
Dame:
1. ¿Qué es? (principio activo, mecanismo, clase)
2. TODAS las marcas comerciales disponibles en Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas) con presentaciones exactas y precios aproximados
3. Dosis en adultos (posología completa)
4. Indicaciones principales
5. Contraindicaciones
6. Efectos adversos`;
  } else {
    prompt=`Soy médico en Ecuador. Busco TODOS los jarabes/suspensiones/gotas orales de: "${q}".
Dame:
1. Principio activo y mecanismo
2. TODAS las marcas en jarabe/suspensión disponibles en Ecuador con concentración exacta (mg/ml o mg/5ml), tamaño de frasco y precio aproximado — incluye genéricos y marcas de Fybeca, Pharmacys, Mia, Farmacias Económicas
3. Dosis pediátrica por edad
4. Dosis adulto
5. Desde qué edad se puede usar
6. Contraindicaciones y efectos adversos`;
  }
  prompt+="\n\nResponde en español, organizado con • y subtítulos. Termina con: ⚕️ Verificar con el médico.";
 
  let rep=null;let intentos=0;
  while(intentos<3&&!rep){
    try{
      if(intentos>0) await new Promise(r=>setTimeout(r,1500));
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,temperature:0.2,
          messages:[{role:"user",content:prompt}]})
      });
      const d=await res.json();
      rep=d.choices?.[0]?.message?.content||null;
    }catch(e){}
    intentos++;
  }
  rb.style.display="block";
  rc.textContent=rep||"❌ Sin respuesta. Intenta de nuevo.";
}
 
document.getElementById("qinput").addEventListener("keydown",e=>{
  if(e.key==="Enter") buscarMed();
});
 
// ══ CHAT IA ══
function pregunta(btn){
  document.getElementById("ci").value=btn.textContent.replace("💬 ","").trim();
  sendC();
}
function addMsg(rol,txt){
  const si=document.getElementById("sugs-inicio");if(si)si.style.display="none";
  const ms=document.getElementById("cms");
  const d=document.createElement("div");d.className="cb "+rol;d.textContent=txt;
  ms.appendChild(d);ms.scrollTop=ms.scrollHeight;window.scrollTo(0,document.body.scrollHeight);
}
async function sendC(){
  const inp=document.getElementById("ci");const q=inp.value.trim();
  if(!q||busy)return;
  inp.value="";
  // switch to chat view
  document.getElementById("resp-box").style.display="none";
  addMsg("u",q);CH.push({role:"user",content:q});
  busy=true;document.getElementById("csnd").disabled=true;
  document.getElementById("retry-ia")?.remove();
  const ld=document.createElement("div");ld.className="cld";ld.id="cld-ia";ld.textContent="⏳ Consultando Groq...";
  document.getElementById("cms").appendChild(ld);window.scrollTo(0,document.body.scrollHeight);
 
  const sys=`Eres un asistente farmacológico clínico experto, especializado en el mercado farmacéutico de Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas, Medicity, Sana Sana).
 
Cuando te pregunten por un medicamento, principio activo o marca:
- Da TODAS las marcas comerciales disponibles en Ecuador con presentaciones exactas
- Incluye genéricos y precios aproximados si los conoces
- Para dosis pediátricas: siempre indica rango por edad y por kg
- Si te dan un peso, calcula la dosis exacta en mg y ml
- Diferencia vía aérea superior (nasal) de inferior (bronquial/pulmonar)
- Indica si requiere receta médica
- Sé completo y organizado con • y subtítulos
- Responde siempre en español
- Termina con: ⚕️ Verificar con el médico tratante.`;
 
  let rep=null;let intentos=0;
  while(intentos<3&&!rep){
    try{
      if(intentos>0){
        document.getElementById("cld-ia").textContent="⏳ Reintentando... ("+(intentos+1)+"/3)";
        await new Promise(r=>setTimeout(r,1500));
      }
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,temperature:0.2,
          messages:[{role:"system",content:sys},...CH.slice(-10)]})
      });
      const d=await res.json();
      rep=d.choices?.[0]?.message?.content||null;
    }catch(e){}
    intentos++;
  }
  document.getElementById("cld-ia")?.remove();
  if(rep){CH.push({role:"assistant",content:rep});addMsg("a",rep);}
  else{
    CH.pop();
    const e=document.createElement("div");e.className="cb a";e.id="retry-ia";
    e.innerHTML='❌ Sin respuesta. <button onclick="reintentarChat()" style="background:#8b5cf6;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;margin-left:8px;font-weight:700">🔄 Reintentar</button>';
    document.getElementById("cms").appendChild(e);
  }
  busy=false;document.getElementById("csnd").disabled=false;
}
function reintentarChat(){
  document.getElementById("retry-ia")?.remove();
  if(CH.length&&CH[CH.length-1].role==="user"){
    const q=CH.pop().content;
    document.getElementById("ci").value=q;sendC();
  }
}
document.getElementById("ci").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendC();}
});
 
// INIT
setTab(3);
</script>
</body>
</html>
