      (m.marcasPresent||[]).some(x=>x.m.toLowerCase().includes(q)||x.p.toLowerCase().includes(q));

// ══ CALCULADORA ══
function calcD(id,val){
  const m=DB.find(x=>x.id===id);
  const kg=parseFloat(val);
  const cr=document.getElementById("cr"+id);
  const cv=document.getElementById("cv"+id);
  if(!m||!kg||isNaN(kg)||kg<=0){if(cr)cr.style.display="none";return;}
  if(m.id===41){
    const r=[{max:15,d:"30 mg c/12h"},{min:15,max:23,d:"45 mg c/12h"},{min:23,max:40,d:"60 mg c/12h"},{min:40,d:"75 mg c/12h"}];
    const f=r.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    cv.textContent=f?f.d+" × 5 días":"Ver prospecto";cr.style.display="block";return;
  }
  let tot=m.calcF*kg;
  if(m.calcMax&&tot>m.calcMax)tot=m.calcMax;
  let txt=`${tot.toFixed(1)} ${m.calcU}`;
  if(m.calcDiv&&m.calcDiv>1)txt+=` → ${(tot/m.calcDiv).toFixed(1)} mg/dosis`;
  const mx=(m.composicion||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if(mx){const mgml=parseFloat(mx[1])/parseFloat(mx[2]);const dv=m.calcDiv&&m.calcDiv>1?tot/m.calcDiv:tot;if(!isNaN(dv/mgml))txt+=` = ${(dv/mgml).toFixed(1)} ml/dosis`;}
  cv.textContent=txt;cr.style.display="block";
}

function addBubble(rol,txt){
  document.getElementById("chat-welcome")&&(document.getElementById("chat-welcome").style.display="none");
  const msgs=document.getElementById("chat-messages");
  const div=document.createElement("div");
  div.className="chat-bubble "+rol;
  div.textContent=txt;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}
 
async function sendChat(){
  const inp=document.getElementById("chat-input");
  const q=inp.value.trim();
  if(!q||chatBusy)return;
  inp.value="";inp.style.height="42px";
  addBubble("user",q);
  chatHist.push({role:"user",content:q});
  chatBusy=true;
  document.getElementById("chat-send").disabled=true;
  const load=document.createElement("div");
  load.className="chat-loading";load.id="chat-load";load.textContent="⏳ Consultando Groq (llama3)...";
  document.getElementById("chat-messages").appendChild(load);
  document.getElementById("chat-messages").scrollTop=9999;
 
  const dbCtx=DB.map(m=>`[${m.id}] ${m.nombre} | Cat:${m.cat} | Edad mínima:${m.edadLabel} | EdadMin_años:${m.edadMin} | Marcas:${(m.marcasPresent||[]).map(x=>x.m).join(",")} | Indicación:${m.indicacion} | Dosis:${m.dosis} | Contraindicaciones:${m.contraindicacion}`).join("\n");
 
  const systemPrompt=`Eres un asistente farmacológico clínico experto en medicina respiratoria pediátrica y adultos, con acceso a esta base de datos de medicamentos:\n\n${dbCtx}\n\nREGLAS CRÍTICAS:\n1. Cuando pregunten por edad (ej. "menor de 2 años", "bebé", "lactante", "recién nacido", "3 meses"), filtra ESTRICTAMENTE y lista SOLO los medicamentos con edadMin_años <= la edad indicada.\n2. Para cada medicamento relevante muestra: nombre, marcas principales, edad mínima, dosis clave.\n3. Si preguntan "¿se puede dar X a un niño de Y años?" responde directamente SÍ o NO con justificación.\n4. Señala errores clínicos importantes (ej: ipratropio MDI solo ≥6a pero nebulización desde RN son cosas distintas).\n5. Sé conciso, usa listas con •\n6. Termina siempre con: "⚕️ Verificar con el médico tratante."\n7. Responde siempre en español.`;
 
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
      body:JSON.stringify({
        model:"llama3-8b-8192",
        max_tokens:1000,
        temperature:0.3,
        messages:[
          {role:"system",content:systemPrompt},
          ...chatHist.slice(-8)
        ]
      })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"Sin respuesta.";
    chatHist.push({role:"assistant",content:reply});
    document.getElementById("chat-load")?.remove();
    addBubble("ai",reply);
  }catch(e){
    document.getElementById("chat-load")?.remove();
    addBubble("ai","❌ Error de conexión con Groq. Verifica tu internet.");
    chatHist.pop();
  }
  chatBusy=false;
  document.getElementById("chat-send").disabled=false;
}
 
document.getElementById("chat-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
});
 
// ══ INIT ══
buildFilters();
renderList();
</script>
</body>
