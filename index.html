.tab.on{color:#fff;}
.t0.on{background:#10b981;}.t1.on{background:#3b82f6;}.t2.on{background:#06b6d4;}.t3.on{background:#8b5cf6;}

#qbtn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;color:#fff;}

.ib{border-radius:8px;padding:8px 10px;}
.ib.full{grid-column:span 2;}
.it{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.iv{font-size:10px;color:#cbd5e1;line-height:1.65;}

// ══ TABS ══════════════════════════════════════════════════════
function setTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("on",i===t));
  const colors=["#10b981","#3b82f6","#06b6d4","#8b5cf6"];
  document.getElementById("qbtn").style.background=colors[t]||"#8b5cf6";
  const sb=document.getElementById("search-bar");
  const pb=document.getElementById("peso-bar");
  const cw=document.getElementById("chat-wrap");
  const bd=document.getElementById("body");
  if(t===3){
    sb.style.display="none";pb.style.display="none";
    cw.style.display="block";bd.style.display="block";
    document.getElementById("results").innerHTML="";
  } else {
    sb.style.display="block";
    pb.style.display = t===0 ? "flex" : "none";
    cw.style.display="none";bd.style.display="block";
    const pills=t===0?PILLS_NINOS:t===1?PILLS_ADULTOS:PILLS_JAR;
    document.getElementById("pills").innerHTML=pills.map(p=>`<span class="pill" onclick="pillClick('${p}')">${p}</span>`).join("");
    document.getElementById("qinput").placeholder=
      t===0?"Buscar por nombre o principio activo (ambroxol, Fluimucil, salbutamol, mometasona...)":
      t===1?"Buscar medicamento adulto (Symbicort, Seretide, Augmentine, mometasona...)":
      "Buscar jarabe/suspensión (ambroxol, Tussolvina, Abrilar, amoxicilina...)";
    filtrar();
  }
}
 
function pillClick(p){
  document.getElementById("qinput").value=p;filtrar();
}
function onPesoChange(){
  pesoKg=parseFloat(document.getElementById("kg").value)||0;
  // re-render if results visible
  const q=document.getElementById("qinput").value.trim();
  if(q) filtrar();
}
 
// ══ FILTRAR + MOSTRAR ════════════════════════════════════════
function filtrar(){
  const q=document.getElementById("qinput").value.toLowerCase().trim();
  const list=DB.filter(m=>{
    // tab filter
    if(curTab===0 && m.eMin>=18) return false;
    if(curTab===2 && m.forma!=="jarabe") return false;
    if(!q) return true;
    return m.n.toLowerCase().includes(q)||
      m.comp.toLowerCase().includes(q)||
      (m.tags||[]).some(t=>t.toLowerCase().includes(q))||
      (m.marcas||[]).some(x=>x.m.toLowerCase().includes(q));
  });
  renderResults(list);
}
 
function renderResults(list){
  const el=document.getElementById("results");
  if(!list.length){
    el.innerHTML=`<div class="no-res" style="text-align:center;padding:40px;color:#334155"><div style="font-size:36px">🔍</div><p style="margin-top:8px;font-size:12px">Sin resultados — prueba con otro término</p></div>`;
    return;
  }
  el.innerHTML=list.map(m=>renderCard(m)).join("");
}
 
function renderCard(m){
  const a=CC[m.cat]||"#3b82f6";
  const ac=m.eMin===0?"#34d399":m.eMin>=18?"#f87171":"#93c5fd";
  const ab=m.eMin===0?"rgba(16,185,129,.15)":m.eMin>=18?"rgba(239,68,68,.15)":"rgba(59,130,246,.15)";
  const at=m.eMin===0?"✅ Desde RN":m.eMin>=18?"⚠️ "+m.eL:"✅ "+m.eL;
  const esNinos=curTab===0;
  const dosisTexto=esNinos?m.dosNino:curTab===1?m.dosAdulto:(m.dosNino+" | Adulto: "+m.dosAdulto);
 
  // Calcular dosis si hay peso
  let calcHtml="";
  if(esNinos && m.calcPeso && pesoKg>0){
    const dc=calcDosisVal(m,pesoKg);
    if(dc) calcHtml=`<div class="dosis-calc">
      <div class="dc-titulo">⚖️ Dosis calculada para ${pesoKg} kg</div>
      <div class="dc-valor">${dc}</div>
      <div class="dc-sub">Verifica siempre con el médico tratante</div>
    </div>`;
  }
 
  const marcasHtml=(m.marcas||[]).map(x=>
    `<div class="marca-row"><span class="marca-nm" style="color:${a}">${x.m}</span><span class="marca-pr">${x.p}</span></div>`
  ).join("");
 
  return `<div class="med-card" style="border:1px solid ${a}30">
    <div class="med-head" style="background:${a}12;border-bottom:1px solid ${a}20">
      <div class="med-nombre">${m.n}</div>
      <div class="med-comp" style="color:${a}">${m.comp}</div>
      <div class="med-badges">
        <span class="badge" style="background:rgba(255,255,255,.07);color:#94a3b8">📍 ${m.via}</span>
        <span class="badge" style="background:${ab};color:${ac}">${at}</span>
        <span class="badge" style="background:${a}15;color:${a}">${CI[m.cat]||""} ${m.cat}</span>
      </div>
    </div>

function calcDosisVal(m,kg){
  if(!m.calcPeso||!kg||kg<=0) return "";
  if(m.id===28){
    const r=[{max:15,d:"30mg c/12h"},{min:15,max:23,d:"45mg c/12h"},{min:23,max:40,d:"60mg c/12h"},{min:40,d:"75mg c/12h"}];
    const f=r.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    return f?f.d+" × 5 días":"Ver prospecto";
  }
  let tot=m.calcF*kg;
  if(m.calcMax&&tot>m.calcMax) tot=m.calcMax;
  let txt=tot.toFixed(1)+" "+m.calcU;
  if(m.calcDiv&&m.calcDiv>1) txt+=" → "+(tot/m.calcDiv).toFixed(1)+"mg/dosis";
  const mx=(m.comp||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if(mx){
    const mgml=parseFloat(mx[1])/parseFloat(mx[2]);
    const dv=m.calcDiv&&m.calcDiv>1?tot/m.calcDiv:tot;
    if(!isNaN(dv/mgml)) txt+=" = "+(dv/mgml).toFixed(1)+"ml/dosis";
  }
  return txt;
}
 
// ══ CHAT IA ══════════════════════════════════════════════════
function ps(btn){document.getElementById("ci").value=btn.textContent.replace("💬 ","").trim();sendC();}
function addMsg(rol,txt){
  const si=document.getElementById("sugs");if(si)si.style.display="none";
  const ms=document.getElementById("cms");
  const d=document.createElement("div");d.className="cb "+rol;d.textContent=txt;
  ms.appendChild(d);ms.scrollTop=ms.scrollHeight;window.scrollTo(0,document.body.scrollHeight);
}
async function sendC(){
  const inp=document.getElementById("ci");const q=inp.value.trim();
  if(!q||busy)return;
  inp.value="";addMsg("u",q);CH.push({role:"user",content:q});
  busy=true;document.getElementById("csnd").disabled=true;
  document.getElementById("retry-ia")?.remove();
  const ld=document.createElement("div");ld.className="cld";ld.id="cld-ia";ld.textContent="⏳ Consultando Groq...";
  document.getElementById("cms").appendChild(ld);window.scrollTo(0,document.body.scrollHeight);
 
  // Build context from DB
  const dbCtx=DB.map(m=>`[${m.id}] ${m.n} | eMin:${m.eMin}a | Marcas Ecuador verificadas:${(m.marcas||[]).map(x=>x.m).join(",")} | DosNino:${m.dosNino} | DosAdulto:${m.dosAdulto} | CI:${m.ci}`).join("\n");
 
  const sys=`Eres un asistente farmacológico clínico experto. Tienes acceso a esta base de datos VERIFICADA de medicamentos en Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas):
 
${dbCtx}
 
REGLAS CRÍTICAS:
1. Cuando menciones marcas comerciales, usa SOLO las que están en la base de datos verificada de Ecuador. NO inventes marcas.
2. Si te preguntan por un medicamento que no está en la base de datos, responde con tu conocimiento clínico pero ADVIERTE que no tienes confirmación de disponibilidad en Ecuador.
3. Para dosis pediátricas con peso específico: calcula la dosis exacta en mg y ml.
4. Diferencia vía aérea SUPERIOR (nasal/faríngea) de INFERIOR (bronquial/pulmonar). Los sprays nasales son solo para uso nasal, NO para mucolíticos.
5. Indica si requiere receta médica.
6. Filtra por edad cuando te la indiquen.
7. Responde en español con listas • y subtítulos.
8. Termina siempre con: ⚕️ Verificar con el médico tratante.`;
 
  let rep=null,intentos=0;
  while(intentos<3&&!rep){
    try{
      if(intentos>0){
        document.getElementById("cld-ia").textContent="⏳ Reintentando... ("+(intentos+1)+"/3)";
        await new Promise(r=>setTimeout(r,1500));
      }
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,temperature:0.2,
          messages:[{role:"system",content:sys},...CH.slice(-10)]})
      });
      const d=await res.json();rep=d.choices?.[0]?.message?.content||null;
    }catch(e){}
    intentos++;
  }
  document.getElementById("cld-ia")?.remove();
  if(rep){CH.push({role:"assistant",content:rep});addMsg("a",rep);}
  else{
    CH.pop();
    const e=document.createElement("div");e.className="cb a";e.id="retry-ia";
    e.innerHTML='❌ Sin respuesta. <button onclick="reintentarChat()" style="background:#8b5cf6;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;margin-left:8px;font-weight:700">🔄 Reintentar</button>';
    document.getElementById("cms").appendChild(e);
  }
  busy=false;document.getElementById("csnd").disabled=false;
}
function reintentarChat(){
  document.getElementById("retry-ia")?.remove();
  if(CH.length&&CH[CH.length-1].role==="user"){
    const q=CH.pop().content;document.getElementById("ci").value=q;sendC();
  }
}
document.getElementById("ci").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendC();}
});
document.getElementById("qinput").addEventListener("keydown",e=>{
  if(e.key==="Enter") filtrar();
});
