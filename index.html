<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>MediRespira – Guía de Medicamentos Respiratorios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#080e1c;color:#e2e8f0;min-height:100vh;}
input,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0f172a;}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px;}

/* HEADER */
#header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(148,163,184,0.1);
  padding:12px 14px;position:sticky;top:0;z-index:60;backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.logo{background:linear-gradient(135deg,#2563eb,#0891b2);border-radius:11px;
  padding:8px 11px;font-size:18px;line-height:1;}
.logo-text h1{font-size:16px;font-weight:800;color:#f1f5f9;letter-spacing:-.3px;}
.logo-text p{font-size:9px;color:#475569;}
.badge-ref{margin-left:auto;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
  border-radius:7px;padding:3px 9px;font-size:9px;color:#fca5a5;white-space:nowrap;}

/* TABS */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px;}
.tab{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;
  font-weight:700;transition:all .15s;background:transparent;color:#64748b;}
.tab.active{background:#2563eb;color:#fff;}

/* SEARCH */
#search{width:100%;padding:9px 13px;border-radius:9px;
  border:1px solid rgba(148,163,184,0.14);background:rgba(255,255,255,0.05);
  color:#f1f5f9;font-size:12px;outline:none;}
#search::placeholder{color:#475569;}

/* FILTERS */
.filters{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;align-items:center;}
.cat-btn{padding:3px 9px;border-radius:14px;border:none;cursor:pointer;
  font-size:9px;font-weight:700;transition:all .15s;white-space:nowrap;
  background:rgba(255,255,255,0.06);color:#94a3b8;}
.cat-btn.active{color:#fff;}
.age-filters{margin-left:auto;display:flex;gap:3px;}
.age-btn{padding:3px 8px;border-radius:10px;border:1px solid transparent;
  cursor:pointer;font-size:9px;font-weight:700;
  background:rgba(255,255,255,0.04);color:#64748b;}
.age-btn.active{background:rgba(16,185,129,0.18);border-color:rgba(16,185,129,0.4);color:#34d399;}

/* BODY LAYOUT */
#body{max-width:1060px;margin:0 auto;padding:10px 10px 28px;display:flex;gap:10px;flex-wrap:wrap;}

/* LIST */
#list-panel{flex:0 0 248px;max-width:248px;}
.result-count{font-size:9px;color:#334155;margin-bottom:5px;}
#med-list{display:flex;flex-direction:column;gap:4px;
  max-height:calc(100vh - 155px);overflow-y:auto;padding-right:2px;}
.med-card{padding:8px 10px;border-radius:8px;cursor:pointer;
  background:rgba(255,255,255,0.025);border:1px solid rgba(148,163,184,0.06);
  transition:all .14s;}
.med-card:hover{background:rgba(255,255,255,0.05);}
.med-card.active{border-color:var(--ac)50;background:color-mix(in srgb, var(--ac) 10%, transparent);}
.med-card .mn{font-size:11px;font-weight:700;color:#f1f5f9;line-height:1.25;}
.med-card .mc{font-size:9px;font-weight:600;margin-top:1px;}
.med-card .mm{font-size:9px;color:#475569;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.edad-badge{font-size:8px;padding:1px 6px;border-radius:7px;
  font-weight:700;margin-top:3px;display:inline-block;}

/* DETAIL PANEL */
#detail-panel{flex:1 1 370px;min-width:300px;
  max-height:calc(100vh - 155px);overflow-y:auto;}
.detail-box{border-radius:13px;overflow:hidden;
  border:1px solid rgba(148,163,184,0.08);background:rgba(6,10,22,0.97);}
.detail-head{padding:13px 15px;}
.detail-name{font-size:14px;font-weight:800;color:#f8fafc;line-height:1.3;}
.detail-comp{font-size:10px;margin-top:3px;line-height:1.5;}
.head-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.hbadge{font-size:8px;padding:2px 7px;border-radius:7px;}

/* MARCAS TABLE */
.marcas-section{padding:10px 14px;border-top:1px solid rgba(148,163,184,0.07);
  border-bottom:1px solid rgba(148,163,184,0.07);}
.section-title{font-size:9px;font-weight:800;color:#64748b;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.marca-row{display:flex;gap:8px;align-items:flex-start;
  background:rgba(255,255,255,0.025);border-radius:6px;padding:5px 8px;margin-bottom:3px;}
.marca-name{font-size:10px;font-weight:700;min-width:140px;flex-shrink:0;}
.marca-pres{font-size:9px;color:#94a3b8;line-height:1.4;}

/* INFO GRID */
.info-grid{padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.info-box{border-radius:8px;padding:8px 10px;}
.info-box.full{grid-column:span 2;}
.info-box-title{font-size:8px;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px;}
.info-box-text{font-size:10px;color:#cbd5e1;line-height:1.65;}

/* CALCULATOR */
.calc-section{margin:0 14px 12px;border-radius:9px;padding:10px 12px;
  background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);}
.calc-title{font-size:9px;font-weight:800;color:#f59e0b;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.calc-row{display:flex;gap:6px;align-items:center;}
#peso-input{width:65px;padding:7px 9px;border-radius:7px;
  border:1px solid rgba(245,158,11,.3);background:rgba(0,0,0,.3);
  color:#fbbf24;font-size:16px;font-weight:800;outline:none;text-align:center;}
.calc-label{font-size:11px;color:#64748b;}
.calc-result{margin-top:7px;background:rgba(245,158,11,.1);border-radius:7px;
  padding:7px 10px;border:1px solid rgba(245,158,11,.22);display:none;}
.calc-result-label{font-size:8px;color:#94a3b8;text-transform:uppercase;margin-bottom:2px;}
.calc-result-value{font-size:13px;font-weight:800;color:#fbbf24;}

/* DISCLAIMER */
.disclaimer{margin:0 14px 12px;background:rgba(239,68,68,.05);border-radius:7px;
  padding:6px 10px;border:1px solid rgba(239,68,68,.1);
  font-size:8px;color:#7f1d1d;line-height:1.5;}

/* EMPTY STATE */
.empty-state{display:flex;align-items:center;justify-content:center;
  min-height:280px;flex:1;}
.empty-inner{text-align:center;color:#1e293b;}
.empty-icon{font-size:48px;margin-bottom:8px;}
.empty-text{font-size:12px;color:#334155;}
.empty-sub{font-size:10px;color:#1e293b;margin-top:4px;}

/* CHAT */
#chat-panel{max-width:680px;margin:0 auto;
  display:flex;flex-direction:column;height:calc(100vh - 130px);}
#chat-messages{flex:1;overflow-y:auto;display:flex;
  flex-direction:column;gap:10px;padding:8px 4px;}
.chat-bubble{max-width:85%;padding:10px 13px;border-radius:12px;
  font-size:12px;line-height:1.7;white-space:pre-wrap;}
.chat-bubble.user{align-self:flex-end;background:#1d4ed8;color:#eff6ff;
  border-bottom-right-radius:2px;}
.chat-bubble.ai{align-self:flex-start;background:rgba(255,255,255,.05);
  color:#cbd5e1;border-bottom-left-radius:2px;}
.chat-loading{align-self:flex-start;background:rgba(255,255,255,.05);
  border-radius:12px;border-bottom-left-radius:2px;
  padding:10px 14px;font-size:12px;color:#64748b;}
.chat-examples{text-align:center;padding:40px 20px;color:#334155;}
.chat-ex-icon{font-size:44px;margin-bottom:10px;}
.chat-ex-title{font-size:14px;color:#475569;margin-bottom:8px;}
.chat-suggestion{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);
  border-radius:8px;padding:6px 14px;color:#94a3b8;font-size:11px;
  cursor:pointer;text-align:left;margin:3px auto;display:block;
  width:90%;max-width:480px;transition:all .15s;}
.chat-suggestion:hover{background:rgba(255,255,255,.07);color:#cbd5e1;}
.chat-input-row{display:flex;gap:6px;padding:8px 0 0;}
#chat-input{flex:1;padding:10px 13px;border-radius:10px;
  border:1px solid rgba(148,163,184,.15);background:rgba(255,255,255,.06);
  color:#f1f5f9;font-size:12px;outline:none;}
#chat-input::placeholder{color:#475569;}
#chat-send{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;background:#2563eb;color:#fff;transition:all .15s;}
#chat-send:disabled{background:rgba(255,255,255,.05);color:#334155;cursor:not-allowed;}

/* No results */
.no-results{text-align:center;padding:30px 10px;color:#334155;}
.no-results-icon{font-size:32px;}

@media(max-width:600px){
  #list-panel{flex:0 0 100%;max-width:100%;}
  #detail-panel{flex:0 0 100%;}
  .marca-name{min-width:110px;}
}
</style>
</head>

// APP STATE
// ══════════════════════════════════════════════════════════════
const CAT_COLORS = {
  "Spray Nasal":"#0ea5e9","Puff/Aerosol":"#f59e0b",
  "Nebulización":"#8b5cf6","Antibiótico":"#10b981",
  "Mucolítico/Antitusivo":"#06b6d4","Antihistamínico":"#a78bfa",
  "Corticoide Oral":"#f97316","Antigripal":"#ef4444",
};
const CAT_ICONS = {
  "Spray Nasal":"💨","Puff/Aerosol":"🫁","Nebulización":"🌫️",
  "Antibiótico":"🦠","Mucolítico/Antitusivo":"🧴",
  "Antihistamínico":"🌿","Corticoide Oral":"⚡","Antigripal":"🤧",
};
const CATS = ["Todos",...Object.keys(CAT_COLORS)];

let currentTab = "lista";
let currentCat = "Todos";
let currentEdad = "todos";
let selectedId = null;
let chatHistory = [];
let chatLoading = false;

// Update subtitle
document.getElementById("subtitle").textContent =
  `${DB.length} medicamentos · ${DB.reduce((a,m)=>a+(m.marcasPresent?.length||0),0)} marcas/presentaciones`;

// ══════════════════════════════════════════════════════════════
// BUILD CATEGORY FILTERS
// ══════════════════════════════════════════════════════════════
function buildFilters() {
  const cf = document.getElementById("cat-filters");
  cf.innerHTML = CATS.map(c => {
    const color = CAT_COLORS[c] || "#2563eb";
    const icon = CAT_ICONS[c] || "";
    return `<button class="cat-btn${c===currentCat?' active':''}"
      style="${c===currentCat?'background:'+color+';color:#fff':''}"
      onclick="selectCat('${c}')">${icon} ${c}</button>`;
  }).join("") +
  `<div class="age-filters">
    ${[["todos","👥"],["pediatrico","👶"],["adulto","🧑"]].map(([v,l])=>
      `<button class="age-btn${currentEdad===v?' active':''}" onclick="selectEdad('${v}')">${l}</button>`
    ).join("")}
  </div>`;
}

function selectCat(c) {
  currentCat = c; selectedId = null; buildFilters(); renderList(); showEmptyDetail();
}
function selectEdad(v) {
  currentEdad = v; buildFilters(); renderList();
}

// ══════════════════════════════════════════════════════════════
// FILTER + RENDER LIST
// ══════════════════════════════════════════════════════════════
function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  return DB.filter(m => {
    const okC = currentCat === "Todos" || m.cat === currentCat;
    const okQ = !q ||
      m.nombre.toLowerCase().includes(q) ||
      m.composicion.toLowerCase().includes(q) ||
      m.indicacion.toLowerCase().includes(q) ||
      (m.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
      (m.marcasPresent||[]).some(x=>
        x.m.toLowerCase().includes(q)||x.p.toLowerCase().includes(q));
    const okE = currentEdad==="todos" || currentEdad==="adulto" ||
      (currentEdad==="pediatrico" && !m.soloAdultos);
    return okC && okQ && okE;
  });
}

function renderList() {
  const list = getFiltered();
  document.getElementById("result-count").textContent =
    `${list.length} resultado${list.length!==1?"s":""}`;

  const el = document.getElementById("med-list");
  if (!list.length) {
    el.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><p style="font-size:10px;margin-top:6px;">Sin resultados</p></div>`;
    return;
  }
  el.innerHTML = list.map(m => {
    const ac = CAT_COLORS[m.cat] || "#3b82f6";
    const active = m.id === selectedId;
    const ageCls = m.edadMin===0 ? "#34d399" : m.edadMin>=18 ? "#f87171" : "#93c5fd";
    const ageBg  = m.edadMin===0 ? "rgba(16,185,129,0.12)" : m.edadMin>=18 ? "rgba(239,68,68,0.12)" : "rgba(59,130,246,0.12)";
    const ageText = m.edadMin===0 ? "✅ RN" : m.edadMin>=18 ? "🔒 Solo adultos" : `✅ ${m.edadLabel}`;
    return `<div class="med-card${active?' active':''}"
      style="--ac:${ac}${active?';border-color:'+ac+'80;background:'+ac+'14':''}"
      onclick="selectMed(${m.id})">
      <div class="mn">${m.nombre}</div>
      <div class="mc" style="color:${ac}">${CAT_ICONS[m.cat]||""} ${m.cat}</div>
      <div class="mm">${(m.marcasPresent||[]).slice(0,2).map(x=>x.m).join(" · ")}</div>
      <span class="edad-badge" style="background:${ageBg};color:${ageCls}">${ageText}</span>
    </div>`;
  }).join("");
}

// ══════════════════════════════════════════════════════════════
// SHOW DETAIL
// ══════════════════════════════════════════════════════════════
function selectMed(id) {
  selectedId = id;
  const m = DB.find(x=>x.id===id);
  if (!m) return;
  renderList(); // re-render list to update active state
  const ac = CAT_COLORS[m.cat] || "#3b82f6";
  const ageCls = m.edadMin===0?"#34d399":m.edadMin>=18?"#f87171":"#93c5fd";
  const ageBg  = m.edadMin===0?"rgba(16,185,129,.15)":m.edadMin>=18?"rgba(239,68,68,.15)":"rgba(59,130,246,.15)";
  const ageText = m.edadMin===0?"✅ Desde Recién Nacido":m.edadMin>=18?"⚠️ "+m.edadLabel:"✅ "+m.edadLabel;

  const marcasHTML = (m.marcasPresent||[]).map(mp=>
    `<div class="marca-row">
      <span class="marca-name" style="color:${ac}">${mp.m}</span>
      <span class="marca-pres">${mp.p.replace(/\n/g,'<br>')}</span>
    </div>`
  ).join("");

  const calcHTML = m.calcPeso ? `
    <div class="calc-section">
      <div class="calc-title">⚖️ Calculadora por peso</div>
      <div class="calc-row">
        <input id="peso-input" type="number" placeholder="kg" min="0.5" max="200" oninput="calcDosis(${m.id})"/>
        <span class="calc-label">kg del paciente</span>
      </div>
      <div class="calc-result" id="calc-result">
        <div class="calc-result-label">Dosis calculada</div>
        <div class="calc-result-value" id="calc-result-value"></div>
      </div>
    </div>` : "";

  document.getElementById("empty-detail").style.display = "none";
  document.getElementById("drug-detail").style.display = "block";
  document.getElementById("drug-detail").innerHTML = `
    <div class="detail-box" style="border-color:${ac}30">
      <div class="detail-head" style="background:${ac}12;border-bottom:1px solid ${ac}20">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div class="detail-name">${m.nombre}</div>
            <div class="detail-comp" style="color:${ac}">${m.composicion}</div>
          </div>
          <button onclick="showEmptyDetail()" style="background:rgba(255,255,255,.07);border:none;border-radius:7px;color:#64748b;cursor:pointer;padding:3px 8px;font-size:14px;margin-left:8px;">✕</button>
        </div>

// ══════════════════════════════════════════════════════════════
// CALCULADORA
// ══════════════════════════════════════════════════════════════
function calcDosis(id) {
  const m = DB.find(x=>x.id===id);
  const kg = parseFloat(document.getElementById("peso-input").value);
  const resEl = document.getElementById("calc-result");
  const valEl = document.getElementById("calc-result-value");
  if (!m||!kg||isNaN(kg)||kg<=0){resEl.style.display="none";return;}

  // Oseltamivir por rangos
  if (m.id === 38) {
    const rangos=[{max:15,d:"30 mg c/12h"},{min:15,max:23,d:"45 mg c/12h"},
      {min:23,max:40,d:"60 mg c/12h"},{min:40,d:"75 mg c/12h"}];
    const r = rangos.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    valEl.textContent = r ? r.d+" × 5 días" : "Ver prospecto";
    resEl.style.display="block"; return;
  }

  let tot = m.calcF * kg;
  if (m.calcMax && tot > m.calcMax) tot = m.calcMax;
  let txt = `${tot.toFixed(1)} ${m.calcU}`;
  if (m.calcDiv && m.calcDiv > 1) txt += ` → ${(tot/m.calcDiv).toFixed(1)} mg/dosis`;

  // Intento ml
  const match = (m.composicion||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if (match) {
    const mgml = parseFloat(match[1])/parseFloat(match[2]);
    const dv = m.calcDiv&&m.calcDiv>1 ? tot/m.calcDiv : tot;
    if (!isNaN(dv/mgml)) txt += ` = ${(dv/mgml).toFixed(1)} ml/dosis`;
  }
  valEl.textContent = txt;
  resEl.style.display = "block";
}

// ══════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", (i===0&&tab==="lista")||(i===1&&tab==="chat"));
  });
  const body = document.getElementById("body");
  const chatPanel = document.getElementById("chat-panel");
  const listPanel = document.getElementById("list-panel");
  const detailPanel = document.getElementById("detail-panel");
  const searchArea = document.getElementById("search-area");

  if (tab === "lista") {
    listPanel.style.display = "";
    detailPanel.style.display = "";
    chatPanel.style.display = "none";
    searchArea.style.display = "";
    body.style.flexDirection = "";
  } else {
    listPanel.style.display = "none";
    detailPanel.style.display = "none";
    chatPanel.style.display = "flex";
    searchArea.style.display = "none";
    body.style.flexDirection = "column";
    chatPanel.style.width = "100%";
  }
}

// ══════════════════════════════════════════════════════════════
// CHAT IA — usa Anthropic API con contexto de la DB
// ══════════════════════════════════════════════════════════════
function askSuggestion(btn) {
  const txt = btn.textContent.replace("💬 ","").trim();
  document.getElementById("chat-input").value = txt;
  sendChat();
}

function addBubble(rol, txt) {
  const welcome = document.getElementById("chat-welcome");
  if (welcome) welcome.style.display = "none";
  const msgs = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = `chat-bubble ${rol}`;
  div.style.alignSelf = rol==="user"?"flex-end":"flex-start";
  div.textContent = txt;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChat() {
  const inp = document.getElementById("chat-input");
  const q = inp.value.trim();
  if (!q || chatLoading) return;
  inp.value = "";
  addBubble("user", q);
  chatHistory.push({role:"user", content:q});

  chatLoading = true;
  document.getElementById("chat-send").disabled = true;

  const loadDiv = document.createElement("div");
  loadDiv.className = "chat-loading";
  loadDiv.textContent = "⏳ Consultando base de datos...";
  document.getElementById("chat-messages").appendChild(loadDiv);
  document.getElementById("chat-messages").scrollTop = 9999;

  const dbCtx = DB.map(m =>
    `[${m.id}] ${m.nombre} | ${m.cat} | Edad:${m.edadLabel} | Marcas:${(m.marcasPresent||[]).map(x=>x.m).join(",")} | Indicación:${m.indicacion} | Dosis:${m.dosis}`
  ).join("\n");

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:`Eres un asistente farmacológico clínico experto en medicamentos respiratorios pediátricos y adultos. Tienes acceso a esta base de datos:\n\n${dbCtx}\n\nIMPORTANTE:\n- Cuando te pregunten por edad (ej. "menor de 2 años", "bebé", "lactante", "recién nacido"), filtra y lista SOLO los medicamentos apropiados para esa edad.\n- Para cada medicamento relevante muestra: nombre, marcas principales, edad mínima, dosis resumida.\n- Sé conciso, usa listas con •\n- Si preguntan por una categoría (ej. "spray nasal"), lista los de esa categoría filtrando por edad si se indica.\n- Siempre termina aclarando que es información de referencia y debe verificarse con el médico.\n- Responde siempre en español.`,
        messages: chatHistory.slice(-10)
      })
    });
    const data = await res.json();
    const reply = (data.content||[]).map(x=>x.text||"").join("") || "Sin respuesta del servidor.";
    chatHistory.push({role:"assistant", content:reply});
    loadDiv.remove();
    addBubble("ai", reply);
  } catch(e) {
    loadDiv.remove();
    addBubble("ai", "❌ Error de conexión. Verifica tu internet e intenta de nuevo.");
    chatHistory.pop();
  }
  chatLoading = false;
  document.getElementById("chat-send").disabled = false;
}

// Enter en chat
document.getElementById("chat-input").addEventListener("keydown", e=>{
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
