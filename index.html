function gf(){
  const q=document.getElementById("srch").value.toLowerCase().trim();
  return DB.filter(m=>{
    const oC=curC==="Todos"||m.cat===curC;
    const oQ=!q||m.n.toLowerCase().includes(q)||m.comp.toLowerCase().includes(q)||m.ind.toLowerCase().includes(q)||(m.mp||[]).some(x=>x.m.toLowerCase().includes(q)||x.p.toLowerCase().includes(q));
    const oE=curE==="todos"||curE==="adulto"||(curE==="pediatrico"&&m.eMin<18);
    return oC&&oQ&&oE;
  });
}

function rl(){

    const ab=m.eMin===0?"rgba(16,185,129,0.12)":m.eMin>=18?"rgba(239,68,68,0.12)":"rgba(59,130,246,0.12)";

}
function se2(){selId=null;document.getElementById("ed").style.display="flex";document.getElementById("dd").style.display="none";rl();}

function cd2(id,val){
  const m=DB.find(x=>x.id===id);const kg=parseFloat(val);
  const cr=document.getElementById("cr"+id);const cv=document.getElementById("cv"+id);
  if(!m||!kg||isNaN(kg)||kg<=0){if(cr)cr.style.display="none";return;}
  if(m.id===28){const r=[{max:15,d:"30mg c/12h"},{min:15,max:23,d:"45mg c/12h"},{min:23,max:40,d:"60mg c/12h"},{min:40,d:"75mg c/12h"}];
    const f=r.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    cv.textContent=f?f.d+" × 5 días":"Ver prospecto";cr.style.display="block";return;}
  let tot=m.cf*kg;if(m.cma&&tot>m.cma)tot=m.cma;
  let txt=tot.toFixed(1)+" "+m.cu;
  if(m.cd&&m.cd>1)txt+=" → "+(tot/m.cd).toFixed(1)+"mg/dosis";
  const mx=(m.comp||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if(mx){const mgml=parseFloat(mx[1])/parseFloat(mx[2]);const dv=m.cd&&m.cd>1?tot/m.cd:tot;if(!isNaN(dv/mgml))txt+=" = "+(dv/mgml).toFixed(1)+"ml/dosis";}
  cv.textContent=txt;cr.style.display="block";
}

function showTab(t){
  const il=t==="l";
  document.querySelectorAll(".tab").forEach((x,i)=>x.classList.toggle("on",(i===0&&il)||(i===1&&!il)));
  document.getElementById("lp").style.display=il?"":"none";
  document.getElementById("dp").style.display=il?"":"none";
  document.getElementById("cp").style.display=il?"none":"flex";
  document.getElementById("sa").style.display=il?"":"none";
}

function askS(btn){document.getElementById("ci").value=btn.textContent.replace("💬 ","").trim();sendC();}
function ab2(rol,txt){
  const cw=document.getElementById("cw");if(cw)cw.style.display="none";
  const ms=document.getElementById("cms");
  const d=document.createElement("div");d.className="cb2 "+rol;d.textContent=txt;
  ms.appendChild(d);ms.scrollTop=ms.scrollHeight;return d;
}

async function sendC(){
  const inp=document.getElementById("ci");const q=inp.value.trim();
  if(!q||busy)return;
  inp.value="";ab2("u",q);ch.push({role:"user",content:q});
  busy=true;document.getElementById("csnd").disabled=true;
  const ld=document.createElement("div");ld.className="cld";ld.id="cld";ld.textContent="⏳ Consultando Groq llama3...";
  document.getElementById("cms").appendChild(ld);document.getElementById("cms").scrollTop=9999;

  const ctx=DB.map(m=>`[${m.id}] ${m.n} | ${m.cat} | Vía:${m.via} | edadMin:${m.eMin}años | edadLabel:${m.eL} | Marcas Ecuador:${(m.mp||[]).map(x=>x.m).join(",")} | Indicación:${m.ind} | Dosis:${m.dos} | Contraindicaciones:${m.ci}`).join("\n");
  const sys=`Eres un asistente farmacológico clínico experto en medicamentos respiratorios pediátricos y adultos, con conocimiento específico del mercado farmacéutico de Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas). Base de datos verificada:\n\n${ctx}\n\nREGLAS:\n1. Filtra ESTRICTAMENTE por edad cuando la indiquen. "menor de X años" = solo edadMin <= X.\n2. Para cada medicamento: nombre, marcas Ecuador disponibles, precio si se conoce, edad mínima, dosis clave.\n3. Responde SI/NO directamente a preguntas de indicación por edad con justificación.\n4. Diferencia VÍA SUPERIOR (nasal, faríngea) de VÍA INFERIOR (bronquial, pulmonar).\n5. Señala si requiere receta médica en Ecuador.\n6. Listas con •. Conciso.\n7. Termina con: ⚕️ Verificar con el médico.\n8. Responde en español.`;

  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:900,temperature:0.2,messages:[{role:"system",content:sys},...ch.slice(-8)]})
    });
    const data=await res.json();
    const rep=data.choices?.[0]?.message?.content||"Sin respuesta.";
    ch.push({role:"assistant",content:rep});
    document.getElementById("cld")?.remove();ab2("a",rep);
  }catch(e){
    document.getElementById("cld")?.remove();
    ab2("a","❌ Error de conexión. Verifica tu internet e intenta de nuevo.");
    ch.pop();
  }
