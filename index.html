<title>MediRespira Ecuador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#080e1c;color:#e2e8f0;min-height:100vh;}
input,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0f172a;}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px;}
 
/* HEADER */
#hdr{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(148,163,184,0.1);padding:10px 14px;position:sticky;top:0;z-index:60;backdrop-filter:blur(20px);}
.htop{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.logo{background:linear-gradient(135deg,#2563eb,#0891b2);border-radius:11px;padding:7px 10px;font-size:17px;line-height:1;}
.ht h1{font-size:15px;font-weight:800;color:#f1f5f9;}.ht p{font-size:9px;color:#475569;}
.bref{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:2px 8px;font-size:9px;color:#fca5a5;white-space:nowrap;}
 
/* MAIN TABS */
.main-tabs{display:flex;gap:3px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px;margin-left:auto;}
.main-tab{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#64748b;transition:all .15s;white-space:nowrap;}
.main-tab.on{color:#fff;}
.main-tab.t-ninos.on{background:#10b981;}
.main-tab.t-adultos.on{background:#3b82f6;}
.main-tab.t-jarabes.on{background:#06b6d4;}
.main-tab.t-ia.on{background:#8b5cf6;}
 
/* SEARCH */
#srch{width:100%;padding:8px 12px;border-radius:9px;border:1px solid rgba(148,163,184,0.14);background:rgba(255,255,255,0.05);color:#f1f5f9;font-size:12px;outline:none;margin-bottom:7px;}
#srch::placeholder{color:#475569;}
 
/* CATEGORY FILTERS */
.frow{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.cb{padding:3px 9px;border-radius:14px;border:none;cursor:pointer;font-size:9px;font-weight:700;white-space:nowrap;background:rgba(255,255,255,0.06);color:#94a3b8;transition:all .15s;}
 
/* PESO CALCULATOR - top bar for niños */
#peso-bar{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:8px 12px;margin-bottom:7px;display:none;align-items:center;gap:10px;flex-wrap:wrap;}
#peso-bar label{font-size:11px;color:#34d399;font-weight:700;}
#peso-global{width:80px;padding:6px 10px;border-radius:7px;border:1px solid rgba(16,185,129,0.3);background:rgba(0,0,0,0.3);color:#fbbf24;font-size:16px;font-weight:800;outline:none;text-align:center;}
#peso-display{font-size:11px;color:#64748b;}
 
/* BODY */
#body{max-width:1060px;margin:0 auto;padding:10px 10px 28px;display:flex;gap:10px;flex-wrap:wrap;}
 
/* LIST */
#lp{flex:0 0 250px;max-width:250px;}
.rc{font-size:9px;color:#334155;margin-bottom:5px;}
#ml{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 180px);overflow-y:auto;padding-right:2px;}
.mc{padding:8px 10px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.025);border:1px solid rgba(148,163,184,0.06);transition:all .14s;}
.mc:hover{background:rgba(255,255,255,0.05);}
.mn{font-size:11px;font-weight:700;color:#f1f5f9;line-height:1.25;}
.mcat{font-size:9px;font-weight:600;margin-top:1px;}
.mm{font-size:9px;color:#475569;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eb{font-size:8px;padding:1px 6px;border-radius:7px;font-weight:700;margin-top:3px;display:inline-block;}
 
/* DETAIL */
#dp{flex:1 1 370px;min-width:300px;max-height:calc(100vh - 180px);overflow-y:auto;}
.dbox{border-radius:13px;overflow:hidden;background:rgba(6,10,22,0.97);}
.dh{padding:12px 14px;}
.dn{font-size:14px;font-weight:800;color:#f8fafc;line-height:1.3;}
.dc{font-size:10px;margin-top:3px;line-height:1.5;}
.hbs{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.hb{font-size:8px;padding:2px 7px;border-radius:7px;}
.ms{padding:9px 13px;border-top:1px solid rgba(148,163,184,0.07);border-bottom:1px solid rgba(148,163,184,0.07);}
.st{font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.mr{display:flex;gap:8px;align-items:flex-start;background:rgba(255,255,255,0.025);border-radius:6px;padding:5px 8px;margin-bottom:3px;}
.mk{font-size:10px;font-weight:700;min-width:130px;flex-shrink:0;}
.mp{font-size:9px;color:#94a3b8;line-height:1.4;}
.ig{padding:9px 13px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ib{border-radius:8px;padding:8px 10px;}.ib.full{grid-column:span 2;}
.it{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.iv{font-size:10px;color:#cbd5e1;line-height:1.65;}
 
/* DOSIS CALCULADA - resaltada */
.dosis-calc{margin:0 13px 0;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:9px;padding:10px 13px;display:none;}
.dosis-calc-titulo{font-size:9px;font-weight:800;color:#10b981;text-transform:uppercase;margin-bottom:6px;}
.dosis-calc-valor{font-size:15px;font-weight:800;color:#34d399;}
.dosis-calc-sub{font-size:9px;color:#64748b;margin-top:3px;}
 
.disc{margin:8px 13px 12px;background:rgba(239,68,68,.05);border-radius:7px;padding:6px 10px;border:1px solid rgba(239,68,68,.1);font-size:8px;color:#7f1d1d;line-height:1.5;}
.est{display:flex;align-items:center;justify-content:center;min-height:260px;}
 
/* CHAT */
#cp{max-width:720px;margin:0 auto;display:flex;flex-direction:column;height:calc(100vh - 150px);width:100%;}
#cms{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:6px 4px;}
.cb2{max-width:88%;padding:10px 13px;border-radius:12px;font-size:12px;line-height:1.75;white-space:pre-wrap;}
.cb2.u{align-self:flex-end;background:#1d4ed8;color:#eff6ff;border-bottom-right-radius:2px;}
.cb2.a{align-self:flex-start;background:rgba(255,255,255,.06);color:#cbd5e1;border-bottom-left-radius:2px;}
.cld{align-self:flex-start;background:rgba(255,255,255,.05);border-radius:12px;padding:10px 14px;font-size:12px;color:#64748b;}
.cex{text-align:center;padding:20px 10px;}
.cet{font-size:13px;color:#475569;margin-bottom:10px;}
.cs2{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);border-radius:8px;padding:6px 13px;color:#94a3b8;font-size:11px;cursor:pointer;text-align:left;margin:3px auto;display:block;width:96%;max-width:560px;transition:all .15s;}
.cs2:hover{background:rgba(255,255,255,.08);color:#cbd5e1;}
.cir{display:flex;gap:6px;padding:8px 0 0;}
#ci{flex:1;padding:10px 13px;border-radius:10px;border:1px solid rgba(148,163,184,.15);background:rgba(255,255,255,.06);color:#f1f5f9;font-size:13px;outline:none;}
#ci::placeholder{color:#475569;}
#csnd{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:16px;font-weight:700;background:#8b5cf6;color:#fff;}
#csnd:disabled{background:rgba(255,255,255,.05);color:#334155;cursor:not-allowed;}
.nr{text-align:center;padding:28px 10px;color:#334155;}
 
@media(max-width:620px){
  #lp{flex:0 0 100%;max-width:100%;max-height:260px;}
  #dp{flex:0 0 100%;}
  .mk{min-width:100px;}
  .main-tab span{display:none;}
}
</style>
</head>

</div>

      m.ind.toLowerCase().includes(q)||(m.mp||[]).some(x=>x.m.toLowerCase().includes(q)||x.p.toLowerCase().includes(q));

// ══ CALCULADORA ═══════════════════════════════════════════════════
function calcDosisVal(m,kg){
  if(!m.calcPeso||!kg||kg<=0) return "";
  // Tamiflu por rangos
  if(m.id===29){
    const r=[{max:15,d:"30mg c/12h"},{min:15,max:23,d:"45mg c/12h"},{min:23,max:40,d:"60mg c/12h"},{min:40,d:"75mg c/12h"}];
    const f=r.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    return f?f.d+" × 5 días":"Ver prospecto";
  }
  let tot=m.calcF*kg;
  if(m.calcMax&&tot>m.calcMax) tot=m.calcMax;
  let txt=tot.toFixed(1)+" "+m.calcU;
  if(m.calcDiv&&m.calcDiv>1) txt+=" → "+(tot/m.calcDiv).toFixed(1)+"mg/dosis";
  // Calcular ml si posible
  const mx=(m.comp||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if(mx){
    const mgml=parseFloat(mx[1])/parseFloat(mx[2]);
    const dv=m.calcDiv&&m.calcDiv>1?tot/m.calcDiv:tot;
    if(!isNaN(dv/mgml)) txt+=" = "+(dv/mgml).toFixed(1)+"ml/dosis";
  }
  return txt;
}
 
function updateAllDosis(){
  pesoGlobal=parseFloat(document.getElementById("peso-global").value)||0;
  const pd=document.getElementById("peso-display");
  pd.textContent=pesoGlobal>0?"→ Calculando dosis para "+pesoGlobal+"kg":"";
  // If a med is open, update its dose
  if(selId){
    const m=DB.find(x=>x.id===selId);
    if(m&&m.calcPeso){
      const dcEl=document.getElementById("dc"+m.id);
      const dcvEl=document.getElementById("dcv"+m.id);
      if(dcEl&&dcvEl){
        if(pesoGlobal>0){
          dcvEl.textContent=calcDosisVal(m,pesoGlobal);
          dcEl.style.display="block";
          dcEl.querySelector(".dosis-calc-titulo").textContent="⚖️ Dosis calculada para "+pesoGlobal+" kg";
        } else {
          dcEl.style.display="none";
        }
      }
    }
  }
}

  const sys=`Eres un asistente farmacológico clínico experto en medicamentos respiratorios pediátricos y adultos, con conocimiento del mercado farmacéutico de Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas).

        await new Promise(r=>setTimeout(r,1500));
      }
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,temperature:0.2,
          messages:[{role:"system",content:sys},...CH.slice(-10)]})
      });
      const data=await res.json();
      rep=data.choices?.[0]?.message?.content||null;
    }catch(e){}
    intentos++;
  }
 
  document.getElementById("cld2")?.remove();
  if(rep){
    CH.push({role:"assistant",content:rep});addMsg("a",rep);
  } else {
    CH.pop();
    const errDiv=document.createElement("div");
    errDiv.className="cb2 a";errDiv.id="retry-btn2";
    errDiv.innerHTML='❌ Sin respuesta. <button onclick="retrySendChat()" style="background:#8b5cf6;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;margin-left:8px;font-weight:700;">🔄 Reintentar</button>';
    document.getElementById("cms").appendChild(errDiv);
    document.getElementById("cms").scrollTop=9999;
  }
  busy=false;document.getElementById("csnd").disabled=false;
}
 
function retrySendChat(){
  document.getElementById("retry-btn2")?.remove();
  if(CH.length>0&&CH[CH.length-1].role==="user"){
    const lastQ=CH[CH.length-1].content;CH.pop();
    document.getElementById("ci").value=lastQ;sendC();
  }
}
 
document.getElementById("ci").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendC();}
});
 
// INIT — start on IA tab
setTab("ia");
</script>
