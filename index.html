      m.ind.toLowerCase().includes(q)||(m.mp||[]).some(x=>x.m.toLowerCase().includes(q)||x.p.toLowerCase().includes(q));
    const oE=curE==="todos"||curE==="adulto"||(curE==="pediatrico"&&m.eMin<18);

}

function se2(){selId=null;document.getElementById("ed").style.display="flex";document.getElementById("dd").style.display="none";rl();}
function cd2(id,val){
  const m=DB.find(x=>x.id===id);const kg=parseFloat(val);
  const cr=document.getElementById("cr"+id);const cv=document.getElementById("cv"+id);
  if(!m||!kg||isNaN(kg)||kg<=0){if(cr)cr.style.display="none";return;}
  if(m.id===34){const r=[{max:15,d:"30mg c/12h"},{min:15,max:23,d:"45mg c/12h"},{min:23,max:40,d:"60mg c/12h"},{min:40,d:"75mg c/12h"}];
    const f=r.find(x=>((x.min==null||kg>=x.min)&&(x.max==null||kg<x.max)));
    cv.textContent=f?f.d+" × 5 días":"Ver prospecto";cr.style.display="block";return;}
  let tot=m.cf*kg;if(m.cma&&tot>m.cma)tot=m.cma;
  let txt=tot.toFixed(1)+" "+m.cu;
  if(m.cd&&m.cd>1)txt+=" → "+(tot/m.cd).toFixed(1)+"mg/dosis";
  const mx=(m.comp||"").match(/(\d+(?:[,.]?\d+)?)\s*mg\/(\d+(?:[,.]?\d+)?)\s*ml/i);
  if(mx){const mgml=parseFloat(mx[1])/parseFloat(mx[2]);const dv=m.cd&&m.cd>1?tot/m.cd:tot;if(!isNaN(dv/mgml))txt+=" = "+(dv/mgml).toFixed(1)+"ml/dosis";}
  cv.textContent=txt;cr.style.display="block";
}

  const inp=document.getElementById("ci");const q=inp.value.trim();
  if(!q||busy)return;
  inp.value="";addMsg("u",q);CH.push({role:"user",content:q});
  busy=true;document.getElementById("csnd").disabled=true;
  const ld=document.createElement("div");ld.className="cld";ld.id="cld";ld.textContent="⏳ Consultando Groq llama3-70b...";
  document.getElementById("cms").appendChild(ld);document.getElementById("cms").scrollTop=9999;
  const ctx=DB.map(m=>`[${m.id}] ${m.n} | ${m.cat} | via:${m.via} | edadMin:${m.eMin}a | edadLabel:${m.eL} | Marcas:${(m.mp||[]).map(x=>x.m).join(",")} | Ind:${m.ind} | Dosis:${m.dos} | CI:${m.ci}`).join("\n");
  const sys=`Eres un asistente farmacológico clínico experto en medicamentos respiratorios pediátricos y adultos. Conoces el mercado farmacéutico de Ecuador (Fybeca, Pharmacys, Mia, Farmacias Económicas).

Base de datos Ecuador:
${ctx}

INSTRUCCIONES:
1. Responde SIEMPRE en español.
2. Para preguntas por edad (ej: "bebé de 3 meses", "niño de 2 años"), filtra y muestra SOLO medicamentos con edadMin <= esa edad.
3. Para cada medicamento: nombre, marcas Ecuador, edad mínima, dosis clave.
4. Responde SI/NO claramente con justificación para preguntas de indicación por edad.
5. Diferencia vía SUPERIOR (nasal, faríngea) de INFERIOR (bronquial, pulmonar).
6. Indica si requiere receta médica en Ecuador.
7. Si te preguntan por un medicamento nuevo que no está en la base de datos, usa tu conocimiento clínico para responder.
8. Sé conciso, usa listas con •.
9. Termina SIEMPRE con: ⚕️ Verificar con el médico tratante.`;
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,temperature:0.2,
        messages:[{role:"system",content:sys},...CH.slice(-10)]})
    });
    const data=await res.json();
    const rep=data.choices?.[0]?.message?.content||"Sin respuesta.";
    CH.push({role:"assistant",content:rep});
    document.getElementById("cld")?.remove();addMsg("a",rep);
  }catch(e){
    document.getElementById("cld")?.remove();
    addMsg("a","❌ Error de conexión con Groq. Verifica tu internet e intenta de nuevo.");
    CH.pop();
  }
  busy=false;document.getElementById("csnd").disabled=false;
}
document.getElementById("ci").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendC();}
});
bf();rl();
</script>
